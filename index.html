<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Election Assistant — your friendly guide to Indian elections. Get info on voter registration, Lok Sabha, Vidhan Sabha, polling booths, EVM voting, and more." />
  <title>🇮🇳 Voter Saathi — Indian Election Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&family=Noto+Sans+Tamil:wght@400;600;700&family=Noto+Sans+Telugu:wght@400;600;700&family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Animated mesh gradient background -->
  <div id="mesh-bg" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>
  <canvas id="particle-canvas" aria-hidden="true"></canvas>

  <main id="app-shell" role="main" aria-label="Election Assistant Application">
    <!-- Glassmorphic Sidebar -->
    <aside id="sidebar" aria-label="Navigation">
      <div class="sidebar-brand">
        <div class="brand-icon">
          <span class="flag-stripe s"></span>
          <span class="flag-stripe w"></span>
          <span class="flag-stripe g"></span>
          <span class="ashoka">☸</span>
        </div>
        <div class="brand-text">
          <span class="brand-name">Voter Saathi</span>
          <span class="brand-tag">वोटर साथी</span>
        </div>
      </div>

      <nav class="sidebar-menu">
        <button class="menu-item active" data-topic="home" id="nav-home">
          <span class="mi-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </span>
          <span class="mi-label">Home</span>
        </button>
        <button class="menu-item" data-topic="register" id="nav-register">
          <span class="mi-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
          </span>
          <span class="mi-label">Voter Registration</span>
        </button>
        <button class="menu-item" data-topic="elections" id="nav-elections">
          <span class="mi-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </span>
          <span class="mi-label">Elections & Dates</span>
        </button>
        <button class="menu-item" data-topic="howtovote" id="nav-howtovote">
          <span class="mi-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          </span>
          <span class="mi-label">How to Vote</span>
        </button>
        <button class="menu-item" data-topic="voterid" id="nav-voterid">
          <span class="mi-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
          </span>
          <span class="mi-label">Voter ID / EPIC</span>
        </button>
        <button class="menu-item" data-topic="evm" id="nav-evm">
          <span class="mi-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/><circle cx="14" cy="18" r="1.5"/></svg>
          </span>
          <span class="mi-label">EVM & VVPAT</span>
        </button>
        <button class="menu-item" data-topic="askai" id="nav-askai">
          <span class="mi-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 1 4 4c0 1.95-1.4 3.58-3.25 3.93L12 22"/><path d="M12 2a4 4 0 0 0-4 4c0 1.95 1.4 3.58 3.25 3.93"/><line x1="4" y1="13" x2="20" y2="13"/></svg>
          </span>
          <span class="mi-label">Ask AI ✨</span>
        </button>
      </nav>

      <!-- Language Selector -->
      <div class="lang-section">
        <label class="lang-label" for="lang-select">🌐 Language</label>
        <select id="lang-select" class="lang-dropdown" aria-label="Select language">
          <option value="en" selected>English</option>
          <option value="hi">हिन्दी (Hindi)</option>
          <option value="ta">தமிழ் (Tamil)</option>
          <option value="te">తెలుగు (Telugu)</option>
          <option value="kn">ಕನ್ನಡ (Kannada)</option>
          <option value="bn">বাংলা (Bengali)</option>
          <option value="mr">मराठी (Marathi)</option>
          <option value="gu">ગુજરાતી (Gujarati)</option>
          <option value="ml">മലയാളം (Malayalam)</option>
          <option value="pa">ਪੰਜਾਬੀ (Punjabi)</option>
          <option value="ur">اردو (Urdu)</option>
          <option value="or">ଓଡ଼ିଆ (Odia)</option>
        </select>
      </div>

      <div class="sidebar-bottom">
        <div class="eci-badge">
          <span class="eci-icon">🏛️</span>
          <span class="eci-text">Data by Election<br/>Commission of India</span>
        </div>
      </div>
    </aside>

    <!-- Mobile Overlay -->
    <div id="sidebar-overlay" aria-hidden="true"></div>

    <!-- Chat Section -->
    <section id="chat-section">
      <!-- Header Bar -->
      <header id="top-bar">
        <button id="menu-toggle" aria-label="Toggle navigation">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="16" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
        </button>
        <div class="topbar-center">
          <h1>Voter Saathi</h1>
          <div class="topbar-status">
            <span class="pulse-ring"></span>
            <span class="status-text">Your Indian Election Guide</span>
          </div>
        </div>
        <div class="topbar-actions">
          <select id="lang-select-mobile" class="lang-dropdown-mini" aria-label="Select language">
            <option value="en">EN</option><option value="hi">हि</option><option value="ta">த</option>
            <option value="te">తె</option><option value="kn">ಕ</option><option value="bn">বা</option>
            <option value="mr">म</option><option value="gu">ગુ</option><option value="ml">മ</option>
            <option value="pa">ਪੰ</option><option value="ur">ار</option><option value="or">ଓ</option>
          </select>
          <button id="btn-reset" aria-label="Reset conversation" title="New conversation">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          </button>
        </div>
      </header>

      <!-- Messages -->
      <div id="messages" aria-live="polite" aria-atomic="false"></div>

      <!-- Quick Actions -->
      <div id="quick-actions" aria-label="Suggested actions"></div>

      <!-- Input Bar -->
      <form id="input-form" autocomplete="off">
        <div class="input-wrapper">
          <label for="msg-input" class="sr-only">Type your message</label>
          <input
            type="text"
            id="msg-input"
            placeholder="Ask about Indian elections, voter ID, polling booths…"
            aria-label="Type your question"
            required
          />
          <button type="submit" id="btn-send" aria-label="Send message">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <p class="input-hint">Powered by Google Gemini AI & Civic Information API · Non-partisan · 12 Languages</p>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
